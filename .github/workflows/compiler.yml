name: Build Kernel Moto G9

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Kernel
      uses: actions/checkout@v4

    - name: Instalar Dependências e Ferramentas
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev libssl-dev bison flex python3 u-boot-tools libncurses5-dev gcc-aarch64-linux-gnu

    - name: Corrigir Kconfigs e Scripts
      run: |
        find . -name "Kconfig*" -exec sed -i 's/\r//g' {} +
        sed -i '63s/\+//g' drivers/input/touchscreen/hxchipset/Kconfig
        echo -e '#!/usr/bin/env python3\nimport sys, subprocess\nsys.exit(subprocess.call(sys.argv[1:]))' > scripts/gcc-wrapper.py
        sed -i '1s/^/#define NOHZ_KICK_MASK 0\ninline int nohz_flags(int cpu){return 0;}\n/' kernel/sched/core.c
        sed -i '1s/^/#define prefer_spread_on_idle(cpu, ...) prefer_spread_on_idle(cpu)\n/' kernel/sched/fair.c

    - name: Compilar o Kernel (KVM Ativo)
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        make O=out vendor/guamp_defconfig
        make O=out

    - name: Upload da Imagem do Kernel (Image.gz)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-MotoG9-KVM
        path: out/arch/arm64/boot/Image.gz-dtb
