name: Build Kernel Moto G9

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Kernel
      uses: actions/checkout@v4

    - name: Instalar Dependências e Ferramentas
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libelf-dev libssl-dev bison flex python3 u-boot-tools libncurses5-dev gcc-aarch64-linux-gnu python-is-python3

    - name: Limpar Caracteres Ocultos e Corrigir Scripts
      run: |
        find . -name "Kconfig*" -exec sed -i 's/\r//g' {} +
        sed -i 's/\+//g' drivers/input/touchscreen/hxchipset/Kconfig
        sed -i 's/print "error, forbidden warning:", m.group(2)/print("error, forbidden warning:", m.group(2))/g' scripts/gcc-wrapper.py

    - name: Compilar o Kernel (KVM Ativo)
      run: |
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        make O=out vendor/guamp_defconfig
        make -j$(nproc) O=out

    - name: Upload da Imagem do Kernel (Image.gz)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-MotoG9-KVM
        path: out/arch/arm64/boot/Image.gz-dtb

